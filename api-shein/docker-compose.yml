
services:
  # =============================================
  # 🌐 Browserless - Chrome Headless
  # =============================================
  browserless:
    image: browserless/chrome:latest
    container_name: shein-browserless
    ports:
      - "3000:3000"
    environment:
      - CONCURRENT=5
      - TOKEN=${BROWSERLESS_TOKEN:-mysecrettoken}
      - TIMEOUT=60000
      - PREBOOT_CHROME=true
      - MAX_CONCURRENT_SESSIONS=10
      - KEEPALIVE=true
      - DEBUG=browserless*
    restart: unless-stopped
    networks:
      - shein-network
    shm_size: '2gb'
    healthcheck:
      # Usar curl para verificar o endpoint /pressure (endpoint válido do browserless)
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure?token=mysecrettoken123"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Aumentar start_period porque o Chrome em container pode demorar a inicializar
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================
  # 🕷️ Scraper Node.js - Executor de Scraping
  # =============================================
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: shein-scraper
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BROWSERLESS_WS=ws://browserless:3000
      - BROWSERLESS_TOKEN=${BROWSERLESS_TOKEN:-mysecrettoken}
      - PORT=3001
      - LOG_LEVEL=info
    depends_on:
      browserless:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shein-network
    volumes:
      - ./logs/scraper:/app/logs
      - ./scraper:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================
  # 🐍 API Python - Interface Principal
  # =============================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: shein-api
    ports:
      - "9000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
      - SCRAPER_URL=http://scraper:3001
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
    depends_on:
      scraper:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shein-network
    volumes:
      - ./logs/api:/app/logs
      - ./api:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================
  # 💾 Redis - Cache e Sessões
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: shein-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - shein-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# =============================================
# 📊 Redes
# =============================================
networks:
  shein-network:
    driver: bridge
    name: shein-network

# =============================================
# 💿 Volumes
# =============================================
volumes:
  redis-data:
    name: shein-redis-data
